<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>МЕДИА.СТРАЖ | Поддержка</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-body: #05070b;
      --bg-panel: #12141b;
      --bg-panel-soft: #151821;
      --border-color: #2c2f3b;

      --text-main: #ffffff;
      --text-muted: #8b8d96;

      --accent-blue: #22d3ee;
      --accent-cyan: #14b8a6;
      --accent-red: #ef4444;
      --accent-yellow: #eab308;
      --accent-gold: #facc15;
      --accent-orange: #f97316;
      --accent-green: #22c55e;

      --shadow-card: 0 16px 40px rgba(0,0,0,.55);
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --container: 1200px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Roboto", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 0%, rgba(34,211,238,.14), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(239,68,68,.08), transparent 25%),
        radial-gradient(circle at bottom, rgba(15,23,42,.7), transparent 60%),
        var(--bg-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, a, input {
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      width: min(100%, var(--container));
      margin: 0 auto;
      padding: 20px 16px 72px;
    }

    /* HEADER */

    header {
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .header-inner {
      background: linear-gradient(180deg, rgba(15,23,42,.96), rgba(15,23,42,.88));
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(30,41,59,.85);
      box-shadow: 0 12px 24px rgba(0,0,0,.5);
    }

    .navbar {
      width: min(100%, var(--container));
      margin: 0 auto;
      min-height: 64px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
    }

    .brand-title {
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      font-size: .95rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #e5e7eb;
      line-height: 1.15;
      max-width: 170px;
    }

    .brand-title span { color: var(--accent-blue); }

    .header-glow {
      height: 2px;
      background: radial-gradient(circle at center, rgba(34,211,238,.75), transparent 70%);
      opacity: .45;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-left: auto;
    }

    .burger {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.35);
      background: rgba(15,23,42,.65);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.4);
    }

    .burger span {
      display: block;
      width: 100%;
      height: 2px;
      margin: 3px 0;
      background: rgba(229,231,235,.95);
      border-radius: 999px;
      transition: .2s ease;
    }

    .burger[aria-expanded="true"] span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .burger[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
    .burger[aria-expanded="true"] span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    .nav-links {
      position: absolute;
      top: calc(100% + 8px);
      right: 16px;
      left: 16px;
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(2,6,23,.96);
      border: 1px solid rgba(51,65,85,.92);
      box-shadow: 0 24px 60px rgba(0,0,0,.65);
      backdrop-filter: blur(14px);
    }

    .nav-links.open { display: flex; }

    .nav-link,
    .support-button-mobile {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 12px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .82rem;
    }

    .nav-link {
      color: var(--text-muted);
      background: rgba(15,23,42,.65);
      border: 1px solid rgba(30,41,59,.85);
    }

    .nav-link.nav-active {
      color: #f9fafb;
      border-color: rgba(45,212,191,.7);
      box-shadow: 0 0 0 1px rgba(45,212,191,.25) inset;
    }

    .support-button-mobile,
    .support-button-desktop {
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
      color: #020617;
      box-shadow: 0 10px 22px rgba(0,0,0,.45);
    }

    .support-button-desktop {
      display: none;
      text-decoration: none;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    /* HERO */

    .hero-support {
      position: relative;
      overflow: hidden;
      margin-top: 18px;
      border-radius: 22px;
      padding: 24px;
      background:
        radial-gradient(circle at 0% 0%, rgba(34,211,238,.18), transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(250,204,21,.10), transparent 28%),
        linear-gradient(180deg, rgba(12,18,32,.95), rgba(6,10,18,.95));
      border: 1px solid rgba(31,41,55,.92);
      box-shadow: 0 24px 70px rgba(0,0,0,.65);
    }

    .hero-support::before {
      content: "";
      position: absolute;
      inset: -30% auto auto -10%;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(34,211,238,.18), transparent 70%);
      pointer-events: none;
    }

    .hero-pill {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--text-muted);
      border: 1px solid rgba(148,163,184,.35);
      background: rgba(15,23,42,.82);
      margin-bottom: 14px;
    }

    .hero-support h1 {
      position: relative;
      z-index: 1;
      margin: 0 0 14px;
      font-family: "Montserrat", sans-serif;
      font-weight: 900;
      font-size: clamp(1.65rem, 5vw, 2.4rem);
      line-height: 1.08;
      letter-spacing: -.02em;
      max-width: 760px;
    }

    .hero-support p {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0;
      color: var(--text-muted);
      font-size: .98rem;
      line-height: 1.7;
    }

    .hero-highlight {
      color: var(--accent-blue);
    }

    /* SECTION HEADERS */

    .section-block {
      margin-top: 34px;
    }

    .section-title {
      margin: 0 0 10px;
      font-family: "Montserrat", sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 800;
      line-height: 1.15;
    }

    .section-subtitle {
      margin: 0 0 18px;
      max-width: 760px;
      color: var(--text-muted);
      font-size: .92rem;
      line-height: 1.65;
    }

    /* SUPPORT CARDS */

    .support-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .support-card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      padding: 20px;
      background:
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.06), transparent 28%),
        radial-gradient(circle at bottom, rgba(34,211,238,.12), transparent 55%),
        linear-gradient(145deg, #050816, #050b13);
      border: 1px solid rgba(31,41,55,.92);
      box-shadow: 0 18px 48px rgba(0,0,0,.55);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .support-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.02), transparent 28%);
      pointer-events: none;
    }

    .support-card-header {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .support-card-label {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(15,23,42,.88);
      border: 1px solid rgba(148,163,184,.25);
      color: var(--text-muted);
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .support-card-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      border: 1px solid rgba(250,204,21,.45);
      color: #fcd34d;
      background: rgba(38,29,5,.55);
      white-space: nowrap;
    }

    .support-card-title {
      position: relative;
      z-index: 1;
      margin: 0 0 8px;
      font-family: "Montserrat", sans-serif;
      font-size: 1.18rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .support-price {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 16px;
      font-family: "Montserrat", sans-serif;
    }

    .support-price strong {
      font-size: 1.9rem;
      line-height: 1;
      font-weight: 900;
      color: #f8fafc;
    }

    .support-price span {
      color: var(--text-muted);
      font-size: .88rem;
      font-family: "Roboto", sans-serif;
    }

    .support-layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .bonus-box {
      border-radius: 16px;
      padding: 14px;
      background: rgba(15,23,42,.68);
      border: 1px solid rgba(51,65,85,.82);
    }

    .bonus-box.highlight {
      background:
        radial-gradient(circle at top, rgba(34,211,238,.18), transparent 70%),
        rgba(15,23,42,.86);
      border-color: rgba(34,211,238,.38);
      box-shadow: inset 0 0 0 1px rgba(34,211,238,.08);
    }

    .bonus-box.project .bonus-list li::before {
      background: var(--accent-green);
      box-shadow: 0 0 10px rgba(34,197,94,.55);
    }

    .bonus-box-title {
      display: block;
      margin-bottom: 10px;
      font-family: "Montserrat", sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .bonus-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .bonus-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: #e5e7eb;
      font-size: .88rem;
      line-height: 1.5;
    }

    .bonus-list li::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent-blue);
      margin-top: .45em;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(34,211,238,.65);
    }

    .support-input-row {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 10px;
      margin-top: auto;
    }

    .support-input-row input {
      flex: 1;
      min-width: 0;
      height: 46px;
      border-radius: 999px;
      border: 1px solid rgba(51,65,85,.85);
      background: rgba(15,23,42,.96);
      color: #e5e7eb;
      font-size: .92rem;
      padding: 0 16px;
    }

    .support-input-row input::placeholder {
      color: rgba(148,163,184,.8);
    }

    .support-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      min-height: 46px;
      padding: 0 18px;
      font-family: "Montserrat", sans-serif;
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease, box-shadow .2s ease;
      white-space: nowrap;
    }

    .support-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .btn-blue {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #04111a;
      box-shadow: 0 12px 28px rgba(8,47,73,.55);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
      color: #2b1600;
      box-shadow: 0 12px 28px rgba(120,53,15,.55);
    }

    /* HONOR BOARD CTA */

    .honor-board-cta {
      margin-top: 18px;
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid rgba(34,211,238,.28);
      background:
        radial-gradient(circle at top, rgba(34,211,238,.16), transparent 70%),
        rgba(15,23,42,.92);
      color: var(--accent-blue);
      font-family: "Montserrat", sans-serif;
      font-size: .8rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(34,211,238,.04);
    }

    /* HONOR MODAL */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,.84);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 70;
      padding: 18px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-dialog {
      width: min(100%, 980px);
      max-height: 88vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      border: 1px solid rgba(51,65,85,.92);
      background:
        radial-gradient(circle at top, rgba(34,211,238,.12), transparent 38%),
        linear-gradient(180deg, rgba(10,16,30,.98), rgba(3,8,16,.98));
      box-shadow: 0 28px 90px rgba(0,0,0,.78);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(51,65,85,.82);
    }

    .modal-header-copy {
      min-width: 0;
    }

    .modal-label {
      display: inline-block;
      margin-bottom: 8px;
      font-size: .72rem;
      line-height: 1.3;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent-blue);
    }

    .modal-title {
      margin: 0 0 6px;
      font-family: "Montserrat", sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.55rem);
      line-height: 1.2;
    }

    .modal-subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: .9rem;
      line-height: 1.55;
      max-width: 720px;
    }

    .modal-close {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(51,65,85,.9);
      background: rgba(15,23,42,.82);
      color: #e5e7eb;
      font-size: 1.25rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .modal-body {
      overflow-y: auto;
      padding: 16px 18px 18px;
    }

    .board-grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr 1fr;
      gap: 14px;
    }

    .board-column {
      position: relative;
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(51,65,85,.82);
      background: rgba(15,23,42,.68);
      min-width: 0;
      overflow: hidden;
    }

    .board-column::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .8;
    }

    .board-column.patrons {
      background:
        radial-gradient(circle at top, rgba(250,204,21,.16), transparent 45%),
        rgba(23,18,8,.75);
      border-color: rgba(250,204,21,.35);
      box-shadow: inset 0 0 0 1px rgba(250,204,21,.06);
    }

    .board-column.patrons::before {
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 28%);
    }

    .board-column.allies {
      background:
        radial-gradient(circle at top, rgba(34,211,238,.16), transparent 45%),
        rgba(10,20,28,.75);
      border-color: rgba(34,211,238,.28);
      box-shadow: inset 0 0 0 1px rgba(34,211,238,.05);
    }

    .board-column.members {
      background:
        radial-gradient(circle at top, rgba(34,197,94,.14), transparent 45%),
        rgba(11,22,16,.74);
      border-color: rgba(34,197,94,.26);
      box-shadow: inset 0 0 0 1px rgba(34,197,94,.05);
    }

    .board-tier {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .board-tier-title {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .board-tier-badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      border: 1px solid currentColor;
      opacity: .95;
      white-space: nowrap;
    }

    .patrons .board-tier-badge { color: #fcd34d; }
    .allies .board-tier-badge { color: #67e8f9; }
    .members .board-tier-badge { color: #86efac; }

    .board-tier-text {
      position: relative;
      z-index: 1;
      margin: 0 0 14px;
      color: var(--text-muted);
      font-size: .84rem;
      line-height: 1.55;
    }

    .donor-list {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
    }

    .donor-card {
      border-radius: 14px;
      padding: 12px;
      background: rgba(2,6,23,.44);
      border: 1px solid rgba(148,163,184,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    .donor-name {
      display: block;
      margin-bottom: 4px;
      font-weight: 700;
      font-size: .92rem;
      color: #f8fafc;
    }

    .donor-role {
      display: block;
      color: var(--text-muted);
      font-size: .76rem;
      line-height: 1.45;
    }

    .board-footer-note {
      margin-top: 14px;
      color: var(--text-muted);
      font-size: .78rem;
      line-height: 1.55;
    }

    /* MOBILE */

    @media (max-width: 900px) {
      .board-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 767px) {
      .container {
        padding: 18px 16px 64px;
      }

      .hero-support {
        padding: 18px 16px;
        border-radius: 18px;
      }

      .section-block {
        margin-top: 26px;
      }

      .support-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .support-card {
        border-radius: 18px;
        padding: 16px;
      }

      .support-card-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .support-price strong {
        font-size: 1.7rem;
      }

      .support-input-row {
        flex-direction: column;
      }

      .support-input-row input,
      .support-btn {
        width: 100%;
      }

      .support-btn {
        min-height: 44px;
      }

      .honor-board-cta {
        min-height: 48px;
        font-size: .74rem;
        letter-spacing: .1em;
      }

      .modal-overlay {
        padding: 0;
        align-items: flex-end;
      }

      .modal-dialog {
        width: 100%;
        max-height: 92vh;
        border-radius: 20px 20px 0 0;
      }

      .modal-header {
        padding: 16px 16px 12px;
      }

      .modal-body {
        padding: 14px 16px 18px;
      }

      .board-column {
        padding: 14px;
      }

      .board-tier {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (min-width: 1024px) {
      .burger { display: none; }

      .site-nav {
        flex: 1;
        justify-content: center;
      }

      .nav-links {
        position: static;
        display: inline-flex !important;
        flex-direction: row;
        gap: 4px;
        padding: 4px 8px;
        background: radial-gradient(circle at top, rgba(31,41,55,.9), transparent 70%);
        border: none;
        box-shadow: none;
        backdrop-filter: none;
      }

      .nav-link,
      .support-button-mobile {
        min-height: 40px;
        padding: 8px 14px;
        border-radius: 999px;
      }

      .nav-link { background: transparent; }
      .support-button-mobile { display: none; }
      .support-button-desktop { display: inline-flex; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
