<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>МЕДИА.СТРАЖ — Рейтинг российских СМИ</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-body: #05070b;
      --bg-panel: #12141b;
      --bg-panel-soft: #151821;
      --border-color: #2c2f3b;
      --text-main: #ffffff;
      --text-muted: #8b8d96;
      --accent-blue: #22d3ee;
      --accent-cyan: #14b8a6;
      --accent-red: #ef4444;
      --accent-yellow: #eab308;
      --accent-green: #22c55e;
      --shadow-card: 0 16px 40px rgba(0,0,0,.55);
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --container: 1200px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Roboto", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 0%, rgba(34,211,238,.14), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(239,68,68,.12), transparent 25%),
        radial-gradient(circle at bottom, rgba(15,23,42,0.7), transparent 60%),
        var(--bg-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, a { -webkit-tap-highlight-color: transparent; }

    .container {
      width: min(100%, var(--container));
      margin: 0 auto;
      padding: 20px 16px 72px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .header-inner {
      background: linear-gradient(180deg, rgba(15,23,42,.96), rgba(15,23,42,.88));
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(30,41,59,.85);
      box-shadow: 0 12px 24px rgba(0,0,0,.5);
    }

    .navbar {
      width: min(100%, var(--container));
      margin: 0 auto;
      min-height: 64px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
    }

    .brand-title {
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      font-size: .95rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #e5e7eb;
      line-height: 1.15;
      max-width: 170px;
    }

    .brand-title span { color: var(--accent-blue); }
    .header-glow {
      height: 2px;
      background: radial-gradient(circle at center, rgba(34,211,238,.75), transparent 70%);
      opacity: .45;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-left: auto;
    }

    .burger {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.35);
      background: rgba(15,23,42,.65);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.4);
    }

    .burger span {
      display: block;
      width: 100%;
      height: 2px;
      margin: 3px 0;
      background: rgba(229,231,235,.95);
      border-radius: 999px;
      transition: .2s ease;
    }

    .burger[aria-expanded="true"] span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .burger[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
    .burger[aria-expanded="true"] span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    .nav-links {
      position: absolute;
      top: calc(100% + 8px);
      right: 16px;
      left: 16px;
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(2,6,23,.96);
      border: 1px solid rgba(51,65,85,.92);
      box-shadow: 0 24px 60px rgba(0,0,0,.65);
      backdrop-filter: blur(14px);
    }

    .nav-links.open { display: flex; }

    .nav-link,
    .support-button-mobile {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 12px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .82rem;
    }

    .nav-link {
      color: var(--text-muted);
      background: rgba(15,23,42,.65);
      border: 1px solid rgba(30,41,59,.85);
    }

    .nav-link.nav-active {
      color: #f9fafb;
      border-color: rgba(45,212,191,.7);
      box-shadow: 0 0 0 1px rgba(45,212,191,.25) inset;
    }

    .support-button-mobile,
    .support-button-desktop {
      font-weight: 700;
      background: linear-gradient(135deg, #facc15, #f97316);
      color: #020617;
      box-shadow: 0 10px 22px rgba(0,0,0,.45);
    }

    .support-button-desktop {
      display: none;
      text-decoration: none;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    main { padding-top: 18px; }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: stretch;
      padding: 10px 0 10px;
    }

    .hero-text,
    .hero-counter {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(12,18,32,.92), rgba(6,10,18,.92));
      border: 1px solid rgba(31,41,55,.9);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-card);
    }

    .hero-text::before,
    .hero-counter::before {
      content: "";
      position: absolute;
      inset: -40% auto auto -10%;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(34,211,238,.22), transparent 70%);
      pointer-events: none;
    }

    .hero-counter::after {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -30px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(239,68,68,.18), transparent 70%);
      pointer-events: none;
    }

    .hero h1 {
      margin: 0;
      position: relative;
      z-index: 1;
      font-family: "Montserrat", sans-serif;
      font-size: clamp(1.55rem, 6vw, 2.4rem);
      line-height: 1.08;
      letter-spacing: -.02em;
      text-wrap: balance;
      text-shadow: 0 0 18px rgba(34,211,238,.12);
    }

    .hero-counter {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .counter-label {
      position: relative;
      z-index: 1;
      font-size: .78rem;
      line-height: 1.45;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--text-muted);
    }

    .counter-label span {
      font-weight: 700;
      color: var(--accent-blue);
    }

    .counter-value {
      position: relative;
      z-index: 1;
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: clamp(2.2rem, 12vw, 4.4rem);
      font-weight: 900;
      line-height: 1;
      color: var(--accent-red);
      text-shadow: 0 0 18px rgba(248,113,113,.65);
    }

    .section-divider {
      width: 100%;
      height: 1px;
      margin: 10px 0 24px;
      background: linear-gradient(90deg, transparent, rgba(34,211,238,.5), transparent);
      opacity: .8;
    }

    .rating-header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      margin-bottom: 16px;
    }

    .rating-header h2 {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: .82rem;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .full-list-button {
      min-height: 46px;
      width: 100%;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.55);
      background: rgba(15,23,42,.95);
      color: #e5e7eb;
      font-size: .82rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      cursor: pointer;
    }

    .full-list-button-mobile {
      display: none;
      margin-top: 14px;
    }

    .media-stage {
      position: relative;
    }

    .media-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .media-card {
      position: relative;
      background:
        radial-gradient(circle at 100% 0%, rgba(255,255,255,.08), transparent 28%),
        radial-gradient(circle at bottom, rgba(34,211,238,.16), transparent 55%),
        linear-gradient(145deg, #050816, #050b13);
      border-radius: 20px;
      border: 1px solid rgba(31,41,55,.95);
      padding: 16px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .media-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 28%);
      pointer-events: none;
    }

    .media-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .media-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: linear-gradient(135deg, rgba(34,211,238,.18), rgba(34,211,238,.04));
      border: 1px solid rgba(148,163,184,.45);
      box-shadow: 0 0 18px rgba(34,211,238,.12);
    }

    .media-name {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.2;
      word-break: break-word;
    }

    .media-type {
      font-size: .78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .rating-score {
      font-family: "Montserrat", sans-serif;
      font-size: 1.45rem;
      font-weight: 900;
      line-height: 1;
      flex-shrink: 0;
    }

    .red-score { color: var(--accent-red); text-shadow: 0 0 12px rgba(248,113,113,.75); }
    .yellow-score { color: var(--accent-yellow); text-shadow: 0 0 12px rgba(234,179,8,.55); }
    .green-score { color: var(--accent-green); text-shadow: 0 0 12px rgba(74,222,128,.55); }

    .media-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      font-size: .84rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .media-details {
      font-size: .86rem;
      line-height: 1.45;
      color: #c3c7d0;
    }

    .small-graph {
      width: 100%;
      height: 28px;
      margin-top: 10px;
      border-radius: 10px;
      background: linear-gradient(to top, #020617, #0b1220);
      position: relative;
      overflow: hidden;
    }

    .small-graph::before {
      content: "";
      position: absolute;
      inset: auto -5% -6px;
      height: 150%;
      background: linear-gradient(to top, rgba(34,211,238,.58), transparent);
      clip-path: polygon(0% 90%, 15% 70%, 30% 80%, 45% 40%, 60% 65%, 75% 55%, 90% 75%, 100% 65%, 100% 100%, 0 100%);
      opacity: .85;
    }

    .media-footer {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: start;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
      font-size: .7rem;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: normal;
      background: rgba(255,255,255,.02);
    }

    .badge-yellow { border-color: var(--accent-yellow); color: var(--accent-yellow); }
    .badge-green { border-color: var(--accent-green); color: var(--accent-green); }

    .link-button {
      appearance: none;
      min-height: 44px;
      width: 100%;
      border: 1px solid rgba(34,211,238,.25);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(10,18,33,.92), rgba(7,12,24,.92));
      color: var(--accent-blue);
      cursor: pointer;
      font-size: .88rem;
      font-weight: 500;
      text-align: center;
    }

    .media-dots {
      display: none;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }

    .media-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(139,141,150,.35);
      border: none;
      padding: 0;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
    }

    .media-dot.active {
      width: 22px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
      box-shadow: 0 0 14px rgba(34,211,238,.45);
    }

    footer {
      border-top: 1px solid rgba(31,41,55,.9);
      padding: 20px 16px 28px;
      text-align: center;
      color: var(--text-muted);
      font-size: .83rem;
      margin-top: 32px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,.82);
      backdrop-filter: blur(8px);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 60;
      padding: 0;
    }

    .modal-overlay.open { display: flex; }

    .modal-dialog {
      width: 100%;
      max-width: 860px;
      max-height: 88vh;
      background: radial-gradient(circle at top, rgba(34,211,238,.12), transparent 50%), #020617;
      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(51,65,85,.9);
      box-shadow: 0 20px 50px rgba(0,0,0,.75);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(51,65,85,.9);
    }

    .modal-header h3 {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: .9rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      line-height: 1.35;
    }

    .modal-header span { color: var(--accent-blue); }

    .modal-close {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(51,65,85,.9);
      background: rgba(15,23,42,.85);
      color: #e5e7eb;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .modal-body {
      overflow-y: auto;
      padding: 8px 16px 20px;
    }

    .full-list-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 1px solid rgba(31,41,55,.8);
    }

    .full-list-name {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .full-list-name .title {
      font-weight: 700;
      line-height: 1.3;
    }

    .full-list-name .type {
      color: var(--text-muted);
      font-size: .78rem;
    }

    .full-list-rating {
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      font-size: 1rem;
      text-align: right;
      white-space: nowrap;
    }

    .full-list-badge {
      grid-column: 1 / -1;
      width: fit-content;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,.7);
      color: var(--text-muted);
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .full-list-rating.red { color: var(--accent-red); }
    .full-list-rating.yellow { color: var(--accent-yellow); }
    .full-list-rating.green { color: var(--accent-green); }
    .full-list-badge.red { border-color: var(--accent-red); color: var(--accent-red); }
    .full-list-badge.yellow { border-color: var(--accent-yellow); color: var(--accent-yellow); }
    .full-list-badge.green { border-color: var(--accent-green); color: var(--accent-green); }

    @media (max-width: 767px) {
      .hero {
        gap: 0;
        padding-bottom: 6px;
      }

      .hero-text,
      .hero-counter {
        backdrop-filter: blur(12px);
      }

      .hero-counter {
        display: none;
      }

      .current-rating-section {
        display: flex;
        flex-direction: column;
      }

      .rating-header {
        margin-top: 0;
        display: block;
        order: 1;
      }

      .rating-header h2 {
        display: none;
      }

      .full-list-button-desktop {
        display: none;
      }

      .full-list-button-mobile {
        display: block;
        order: 3;
      }

      .media-stage {
        order: 2;
      }

      .media-grid.is-mobile-slider {
        position: relative;
        min-height: 350px;
      }

      .media-grid.is-mobile-slider .media-card {
        position: absolute;
        inset: 0;
        opacity: 0;
        transform: translateX(18px) scale(.98);
        pointer-events: none;
        transition: opacity .45s ease, transform .45s ease;
      }

      .media-grid.is-mobile-slider .media-card.is-active {
        opacity: 1;
        transform: translateX(0) scale(1);
        pointer-events: auto;
        position: relative;
      }

      .media-grid.is-mobile-slider .media-card.is-exit-left {
        transform: translateX(-18px) scale(.98);
      }

      .media-dots { display: flex; }
    }

    @media (min-width: 768px) {
      .container { padding: 32px 20px 80px; }
      .navbar { padding: 12px 20px; }
      .brand-title { max-width: none; font-size: 1.02rem; }
      .hero { grid-template-columns: minmax(0, 1fr) 320px; gap: 20px; }
      .rating-header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .full-list-button { width: auto; }
      .media-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .media-meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .media-footer {
        grid-template-columns: 1fr auto;
        align-items: center;
      }
      .link-button { width: auto; padding: 0 16px; }
      .modal-overlay { align-items: center; padding: 20px; }
      .modal-dialog { border-radius: 20px; }
      .full-list-row {
        grid-template-columns: minmax(0, 1.8fr) 80px 140px;
        align-items: center;
      }
      .full-list-badge {
        grid-column: auto;
        justify-self: end;
      }
    }

    @media (min-width: 1024px) {
      .burger { display: none; }
      .site-nav { flex: 1; justify-content: center; }
      .nav-links {
        position: static;
        display: inline-flex !important;
        flex-direction: row;
        gap: 4px;
        padding: 4px 8px;
        background: radial-gradient(circle at top, rgba(31,41,55,.9), transparent 70%);
        border: none;
        box-shadow: none;
        backdrop-filter: none;
      }
      .nav-link,
      .support-button-mobile {
        min-height: 40px;
        padding: 8px 14px;
        border-radius: 999px;
      }
      .nav-link { background: transparent; }
      .support-button-mobile { display: none; }
      .support-button-desktop { display: inline-flex; }
      .hero h1::after {
        content: "";
        position: absolute;
        inset: -8px -12px;
        border-radius: 10px;
        pointer-events: none;
        background: repeating-linear-gradient(180deg, rgba(255,255,255,.07) 0px, rgba(255,255,255,.07) 1px, rgba(0,0,0,0) 2px, rgba(0,0,0,0) 6px);
        opacity: .22;
        mix-blend-mode: soft-light;
      }
      .media-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
      .media-card {
        transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      }
      .media-card:hover {
        transform: translateY(-3px);
        border-color: rgba(56,189,248,.9);
        box-shadow: 0 26px 70px rgba(0,0,0,1), 0 0 30px rgba(56,189,248,.35);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="navbar">
        <div class="brand-title">МЕДИА.<span>СТРАЖ</span></div>

        <nav class="site-nav" aria-label="Навигация">
          <button class="burger" id="burgerBtn" aria-label="Открыть меню" aria-expanded="false" aria-controls="navLinks">
            <span></span><span></span><span></span>
          </button>

          <div class="nav-links" id="navLinks">
            <a href="index.html" class="nav-link nav-active">Рейтинг</a>
            <a href="about.html" class="nav-link">О проекте</a>
            <a href="method.html" class="nav-link">Методика</a>
            <a href="archive.html" class="nav-link">Архив</a>
            <a href="help.html" class="support-button-mobile">Поддержать проект</a>
          </div>
        </nav>

        <a class="support-button-desktop" href="help.html">Поддержать</a>
      </div>
      <div class="header-glow"></div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-text">
        <h1>Первый независимый рейтинг российских СМИ</h1>
      </div>

      <aside class="hero-counter" aria-label="Счётчик за 24 часа">
        <div class="counter-label">Манипулятивных сообщений за последние <span>24 часа</span></div>
        <div class="counter-value" id="dailyCounterValue">0</div>
      </aside>
    </section>

    <div class="section-divider" aria-hidden="true"></div>

    <section class="current-rating-section">
      <div class="rating-header">
        <h2>Рейтинг в реальном времени</h2>
        <button class="full-list-button full-list-button-desktop show-full-list-trigger" type="button">Показать полный список</button>
      </div>

      <div class="media-stage">
        <div class="media-grid" id="mediaGrid"></div>
        <div class="media-dots" id="mediaDots" aria-label="Переключение карточек"></div>
      </div>

      <button class="full-list-button full-list-button-mobile show-full-list-trigger" type="button">Показать полный список</button>
    </section>
  </main>

  <footer>© 2025 Проект «МЕДИА.СТРАЖ»</footer>

  <div class="modal-overlay" id="fullListModal" aria-hidden="true">
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="fullListTitle">
      <div class="modal-header">
        <h3 id="fullListTitle">Полный список <span>СМИ</span></h3>
        <button class="modal-close" id="fullListCloseBtn" type="button" aria-label="Закрыть окно">×</button>
      </div>
      <div class="modal-body" id="fullListContainer"></div>
    </div>
  </div>

  <script>
    const mediaData = [
      { name: "Горизонт 24", type: "ТВ / Онлайн", audience: "Аудитория: 7,3 млн", posts: 142, manipulative: 113, rating: 78, level: "red" },
      { name: "Северный эфир", type: "ТВ", audience: "Аудитория: 9,1 млн", posts: 135, manipulative: 92, rating: 76, level: "red" },
      { name: "Вектор 1", type: "ТВ", audience: "Аудитория: 8,4 млн", posts: 128, manipulative: 95, rating: 72, level: "red" },
      { name: "Сфера Новости", type: "Информагентство", audience: "Аудитория: 6,2 млн", posts: 120, manipulative: 70, rating: 44, level: "yellow" },
      { name: "Народный Курьер", type: "Газета", audience: "Аудитория: 5,1 млн", posts: 110, manipulative: 40, rating: 42, level: "yellow" },
      { name: "Pulse Daily", type: "Онлайн", audience: "Аудитория: 1,9 млн", posts: 64, manipulative: 30, rating: 27, level: "green" },
      { name: "Фокус Медиа", type: "ТВ / Онлайн", audience: "Аудитория: 2,7 млн", posts: 82, manipulative: 32, rating: 25, level: "green" },
      { name: "Свободная Линия", type: "Газета", audience: "Аудитория: 1,1 млн", posts: 54, manipulative: 10, rating: 13, level: "green" },
      { name: "Агентство Орбита", type: "Информагентство", audience: "Аудитория: 4,5 млн", posts: 96, manipulative: 18, rating: 15, level: "green" }
    ];

    const mediaGrid = document.getElementById("mediaGrid");
    const mediaDots = document.getElementById("mediaDots");
    const fullListModal = document.getElementById("fullListModal");
    const fullListContainer = document.getElementById("fullListContainer");
    const showFullListBtns = document.querySelectorAll(".show-full-list-trigger");
    const fullListCloseBtn = document.getElementById("fullListCloseBtn");
    const burgerBtn = document.getElementById("burgerBtn");
    const navLinks = document.getElementById("navLinks");

    const isDesktop = () => window.matchMedia("(min-width: 1024px)").matches;
    const isTablet = () => window.matchMedia("(min-width: 768px)").matches && !isDesktop();
    const isMobile = () => window.matchMedia("(max-width: 767px)").matches;

    let cardsCount = isDesktop() ? 3 : isTablet() ? 4 : mediaData.length;
    let offset = 0;
    let mobileIndex = 0;
    let cycleTimer = null;

    function getBadgeText(level) {
      if (level === "red") return "Высокий уровень манипуляций";
      if (level === "yellow") return "Средний уровень манипуляций";
      return "Низкий уровень манипуляций";
    }

    function initCards() {
      mediaGrid.innerHTML = "";
      cardsCount = isDesktop() ? 3 : isTablet() ? 4 : mediaData.length;
      for (let i = 0; i < cardsCount; i++) {
        const card = document.createElement("article");
        card.className = "media-card";
        card.innerHTML = `
          <header class="media-card-header">
            <div class="media-logo">
              <div class="logo-icon" aria-hidden="true"></div>
              <div>
                <div class="media-name"></div>
                <div class="media-type"></div>
              </div>
            </div>
            <div class="rating-score"></div>
          </header>

          <div class="media-meta">
            <div class="media-audience"></div>
            <div class="media-posts"></div>
          </div>

          <div class="media-details">
            <span class="media-manipulative"></span>
          </div>

          <div class="small-graph" aria-hidden="true"></div>

          <footer class="media-footer">
            <span class="badge"></span>
            <button class="link-button" type="button" data-archive-link>Смотреть примеры</button>
          </footer>
        `;
        mediaGrid.appendChild(card);
      }
      updateCards();
      updateMobileSliderState();
      renderDots();
    }

    function updateCards() {
      const cards = mediaGrid.querySelectorAll(".media-card");
      cards.forEach((card, i) => {
        const media = mediaData[(offset + i) % mediaData.length];
        card.querySelector(".media-name").textContent = media.name;
        const icon = card.querySelector(".logo-icon");
        if (media.type.includes("ТВ")) icon.textContent = "📺";
        else if (media.type.includes("Газета")) icon.textContent = "📰";
        else if (media.type.includes("Информагентство")) icon.textContent = "📡";
        else icon.textContent = "🌐";
        card.querySelector(".media-type").textContent = media.type;
        card.querySelector(".media-audience").textContent = media.audience;
        card.querySelector(".media-posts").textContent = `Публикаций: ${media.posts}`;
        card.querySelector(".media-manipulative").textContent = `Манипулятивных сообщений: ${media.manipulative}`;

        const scoreEl = card.querySelector(".rating-score");
        scoreEl.textContent = `${media.rating}%`;
        scoreEl.className = `rating-score ${media.level}-score`;

        const badge = card.querySelector(".badge");
        badge.className = "badge";
        if (media.level === "yellow") badge.classList.add("badge-yellow");
        if (media.level === "green") badge.classList.add("badge-green");
        badge.textContent = getBadgeText(media.level);
      });
    }

    function updateMobileSliderState(prevIndex = null) {
      const cards = mediaGrid.querySelectorAll(".media-card");
      mediaGrid.classList.toggle("is-mobile-slider", isMobile());
      if (!isMobile()) {
        cards.forEach(card => card.classList.remove("is-active", "is-exit-left"));
        return;
      }

      cards.forEach((card, i) => {
        card.classList.remove("is-active", "is-exit-left");
        if (prevIndex !== null && i === prevIndex && i !== mobileIndex) {
          card.classList.add("is-exit-left");
        }
        if (i === mobileIndex) {
          card.classList.add("is-active");
        }
      });
      updateDots();
    }

    function renderDots() {
      if (!mediaDots) return;
      mediaDots.innerHTML = "";
      if (!isMobile()) return;
      mediaData.forEach((_, index) => {
        const dot = document.createElement("button");
        dot.type = "button";
        dot.className = "media-dot" + (index === mobileIndex ? " active" : "");
        dot.setAttribute("aria-label", `Показать карточку ${index + 1}`);
        dot.addEventListener("click", () => {
          const prev = mobileIndex;
          mobileIndex = index;
          offset = mobileIndex;
          updateCards();
          updateMobileSliderState(prev);
          restartCycle();
        });
        mediaDots.appendChild(dot);
      });
    }

    function updateDots() {
      if (!mediaDots) return;
      [...mediaDots.children].forEach((dot, index) => {
        dot.classList.toggle("active", index === mobileIndex);
      });
    }

    function cycleCards() {
      if (isMobile()) {
        const prev = mobileIndex;
        mobileIndex = (mobileIndex + 1) % mediaData.length;
        offset = mobileIndex;
        updateCards();
        updateMobileSliderState(prev);
        return;
      }
      offset = (offset + cardsCount) % mediaData.length;
      updateCards();
    }

    function startCycle() {
      clearInterval(cycleTimer);
      cycleTimer = setInterval(cycleCards, isMobile() ? 4200 : 5000);
    }

    function restartCycle() {
      startCycle();
    }

    function initDailyCounter() {
      const totalManipulative = mediaData.reduce((sum, m) => sum + m.manipulative, 0);
      const counterEl = document.getElementById("dailyCounterValue");
      if (!counterEl) return;

      let current = 0;
      const duration = 1200;
      const startTime = performance.now();

      function animate(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const value = Math.floor(totalManipulative * progress);
        if (value !== current) {
          current = value;
          counterEl.textContent = current.toLocaleString("ru-RU");
        }
        if (progress < 1) requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    }

    function renderFullList() {
      const sorted = [...mediaData].sort((a, b) => b.rating - a.rating);
      fullListContainer.innerHTML = "";
      sorted.forEach(media => {
        const row = document.createElement("div");
        row.className = "full-list-row";
        row.innerHTML = `
          <div class="full-list-name">
            <span class="title">${media.name}</span>
            <span class="type">${media.type}</span>
          </div>
          <div class="full-list-rating ${media.level}">${media.rating}%</div>
          <div class="full-list-badge ${media.level}">${media.level === "red" ? "высокий риск" : media.level === "yellow" ? "средний риск" : "низкий риск"}</div>
        `;
        fullListContainer.appendChild(row);
      });
    }

    function openModal() {
      renderFullList();
      fullListModal.classList.add("open");
      fullListModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      fullListModal.classList.remove("open");
      fullListModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    showFullListBtns.forEach(btn => btn.addEventListener("click", openModal));
    fullListCloseBtn.addEventListener("click", closeModal);
    fullListModal.addEventListener("click", (e) => {
      if (e.target === fullListModal) closeModal();
    });

    if (burgerBtn && navLinks) {
      burgerBtn.addEventListener("click", () => {
        const isOpen = navLinks.classList.toggle("open");
        burgerBtn.setAttribute("aria-expanded", String(isOpen));
      });

      navLinks.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", () => {
          navLinks.classList.remove("open");
          burgerBtn.setAttribute("aria-expanded", "false");
        });
      });

      document.addEventListener("click", (e) => {
        const target = e.target;
        if (!navLinks.contains(target) && !burgerBtn.contains(target)) {
          navLinks.classList.remove("open");
          burgerBtn.setAttribute("aria-expanded", "false");
        }
      });
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeModal();
        navLinks.classList.remove("open");
        burgerBtn.setAttribute("aria-expanded", "false");
      }
    });

    document.addEventListener("click", (e) => {
      const target = e.target;
      if (target && target.matches("[data-archive-link]")) {
        window.location.href = "archive.html";
      }
    });

    initCards();
    initDailyCounter();
    startCycle();

    window.addEventListener("resize", () => {
      const wasMobile = mediaGrid.classList.contains("is-mobile-slider");
      const nowMobile = isMobile();
      if (wasMobile !== nowMobile || isDesktop() || isTablet()) {
        if (nowMobile) {
          mobileIndex = offset % mediaData.length;
        }
        initCards();
        startCycle();
      }
    });
  </script>
</body>
</html>
