<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>МЕДИА.СТРАЖ | Архив сообщений</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg-body:#05070b;
--bg-panel:#12141b;
--bg-panel-soft:#151821;
--border-color:#2c2f3b;

--text-main:#ffffff;
--text-muted:#8b8d96;

--accent-blue:#22d3ee;
--accent-red:#ef4444;
--accent-yellow:#eab308;
--accent-green:#22c55e;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Roboto',sans-serif;
background:
radial-gradient(circle at top,rgba(15,23,42,.55),transparent 60%),
radial-gradient(circle at bottom,rgba(15,23,42,.65),transparent 60%),
var(--bg-body);
color:var(--text-main);
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px 80px;
}

/* HEADER */

header{position:sticky;top:0;z-index:20;}

.header-inner{
background:rgba(15,23,42,.95);
border-bottom:1px solid rgba(30,41,59,.8);
backdrop-filter:blur(18px);
}

.navbar{
max-width:1200px;
margin:auto;
padding:10px 20px;
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
}

.brand-title{
font-family:'Montserrat',sans-serif;
font-weight:800;
letter-spacing:.14em;
font-size:1.05rem;
text-transform:uppercase;
}

.brand-title span{color:var(--accent-blue);}

nav{
flex:1;
display:flex;
justify-content:center;
}

.nav-links{
display:inline-flex;
gap:4px;
background:rgba(15,23,42,.8);
padding:4px 8px;
border-radius:999px;
}

nav a{
text-decoration:none;
font-size:.85rem;
letter-spacing:.16em;
text-transform:uppercase;
padding:7px 14px;
border-radius:999px;
color:var(--text-muted);
}

nav a:hover{color:#fff;}

.nav-active{
color:#fff;
box-shadow:0 0 0 1px rgba(34,211,238,.7);
}

.support-button{
padding:7px 18px;
border-radius:999px;
font-weight:600;
background:linear-gradient(135deg,#facc15,#f97316);
color:#020617;
text-decoration:none;
font-size:.8rem;
}

.header-glow{
height:2px;
background:radial-gradient(circle,rgba(34,211,238,.9),transparent 70%);
}

/* MOBILE HEADER */

@media(max-width:720px){

.navbar{
flex-direction:column;
align-items:center;
gap:12px;
}

nav{
width:100%;
overflow-x:auto;
}

.nav-links{
width:max-content;
}

.support-button{
width:100%;
text-align:center;
}

}

/* SECTION */

.section-title{
font-family:'Montserrat',sans-serif;
font-size:24px;
margin-bottom:4px;
}

.section-ai{color:var(--accent-blue);}

.section-subtitle{
color:var(--text-muted);
font-size:14px;
max-width:700px;
margin-bottom:20px;
}

/* SEARCH */

.archive-search{
display:flex;
align-items:center;
gap:8px;
padding:9px 16px;
border-radius:999px;
background:#0f172a;
border:1px solid #334155;
margin-bottom:16px;
}

.archive-search input{
flex:1;
background:transparent;
border:none;
color:#fff;
}

/* LIST */

.archive-list{
display:flex;
flex-direction:column;
gap:12px;
max-height:520px;
overflow-y:auto;
}

.archive-item{
border-radius:18px;
background:var(--bg-panel-soft);
border:1px solid #1f2937;
transition:.2s;
}

.archive-item:hover{
transform:translateY(-2px);
border-color:var(--accent-blue);
}

.archive-summary{
padding:16px 18px;
display:grid;
grid-template-columns:1fr 3fr 80px 120px 90px;
gap:12px;
align-items:center;
}

.cell-title{line-height:1.5;}

.cell-index{
font-family:'Montserrat';
font-weight:700;
}

.index-red{color:var(--accent-red);}
.index-yellow{color:var(--accent-yellow);}
.index-green{color:var(--accent-green);}

.cell-category{
font-size:12px;
padding:4px 10px;
border-radius:999px;
border:1px solid #374151;
}

.more-btn{
padding:6px 14px;
border-radius:999px;
background:transparent;
border:1px solid #64748b;
color:#fff;
font-size:11px;
cursor:pointer;
}

.archive-details{
display:none;
padding:14px 18px;
border-top:1px solid #1f2937;
font-size:13px;
}

.archive-details.open{display:block;}

.details-article{
margin-top:8px;
padding:10px 12px;
border-radius:10px;
background:#0f172a;
border:1px solid #334155;
}

.source-btn{
display:inline-block;
margin-top:8px;
padding:6px 14px;
border-radius:999px;
border:1px solid var(--accent-blue);
color:var(--accent-blue);
text-decoration:none;
font-size:11px;
}

.source-btn:hover{
background:rgba(34,211,238,.1);
}

/* MOBILE LIST */

@media(max-width:700px){

.archive-summary{
grid-template-columns:1fr;
row-gap:8px;
}

.more-btn{
align-self:flex-start;
}

}

</style>
</head>

<body>

<header>
<div class="header-inner">

<div class="navbar">

<div class="brand-title">МЕДИА.<span>СТРАЖ</span></div>

<nav>
<div class="nav-links">
<a href="index.html">Рейтинг</a>
<a href="about.html">О проекте</a>
<a href="method.html">Методика</a>
<a href="archive.html" class="nav-active">Архив</a>
</div>
</nav>

<a class="support-button" href="help.html">Поддержать</a>

</div>

<div class="header-glow"></div>
</div>
</header>

<div class="container">

<h2 class="section-title">Архив сообщений <span class="section-ai">ИИ</span></h2>

<p class="section-subtitle">
Используйте поиск, чтобы посмотреть примеры сообщений и анализ манипулятивных приёмов.
</p>

<div class="archive-search">
🔍
<input id="searchInput" placeholder="Поиск по СМИ или заголовку">
</div>

<div class="archive-list" id="archiveList"></div>

</div>

<script>

const messages=[

{
media:"Северный Вестник",
title:"«Власти в панике: эксперты предупреждают о катастрофе уже завтра»",
index:82,
indexClass:"index-red",
category:"Опасное",
text:"Власти оказались не готовы к последствиям — уже завтра страну может ждать катастрофа.",
explain:"Используется апокалиптическая риторика и срочность без фактической базы.",
link:"https://example.com"
},

{
media:"Континент24",
title:"«Экономика рухнула: цены взлетели до небес»",
index:76,
indexClass:"index-red",
category:"Опасное",
text:"Экономика буквально рухнула после нового решения — цены уже взлетели до небес.",
explain:"Гиперболы и эмоциональные формулировки создают ощущение кризиса.",
link:"https://example.com"
},

{
media:"Городской сигнал",
title:"«Большинство жителей поддержали инициативу»",
index:48,
indexClass:"index-yellow",
category:"Спорное",
text:"Большинство жителей города заявили о поддержке инициативы.",
explain:"Не указана методика опроса и выборка.",
link:"https://example.com"
},

{
media:"Агентство фактов",
title:"«Минфин опубликовал отчёт о доходах бюджета»",
index:18,
indexClass:"index-green",
category:"Нейтральное",
text:"Министерство финансов опубликовало годовой отчёт о доходах бюджета.",
explain:"Описывается факт без эмоциональной оценки.",
link:"https://example.com"
}

];

const list=document.getElementById("archiveList");
const searchInput=document.getElementById("searchInput");

function createItem(msg){

const el=document.createElement("article");
el.className="archive-item";

el.innerHTML=`

<div class="archive-summary">

<div>${msg.media}</div>

<div class="cell-title">${msg.title}</div>

<div class="cell-index ${msg.indexClass}">${msg.index}</div>

<div class="cell-category">${msg.category}</div>

<button class="more-btn">Подробнее</button>

</div>

<div class="archive-details">

<p><strong>Анализ:</strong> ${msg.explain}</p>

<div class="details-article">
${msg.text}
</div>

<a class="source-btn" href="${msg.link}" target="_blank">
Открыть оригинальный материал
</a>

</div>
`;

const btn=el.querySelector(".more-btn");
const details=el.querySelector(".archive-details");

btn.onclick=()=>details.classList.toggle("open");

return el;
}

function render(listData){

list.innerHTML="";

listData.forEach(m=>{
list.appendChild(createItem(m));
});

}

searchInput.addEventListener("input",e=>{

const term=e.target.value.toLowerCase();

const filtered=messages.filter(m=>
(m.media+m.title).toLowerCase().includes(term)
);

render(filtered);

});

render(messages);

</script>

</body>
</html>
